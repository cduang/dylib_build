name: 🚀 构建并发布 IOS Il2CppDumper

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0 / auto)'
        required: true
        default: 'auto'

permissions:
  contents: write
  packages: write

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠️ Install dependencies
      run: |
        brew install dpkg ldid

    - name: 📦 Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS
        rm -rf $THEOS/sdks
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    - name: ✏️ Modify Bundle ID
      run: |
        PLIST="IOSIl2CppDumper.plist"

        /usr/libexec/PlistBuddy -c "Set :Filter:Bundles:0 com.tencent.smoba" "$PLIST" \
        || sed -i '' 's/com.kiloo.subwaysurfers/com.tencent.smoba/g' "$PLIST"

        echo "=== plist ==="
        cat "$PLIST"

    - name: 🏗️ Build (stable)
      run: |
        set -e

        cd tb_dylib || cd .

        export ARCHS="arm64 arm64e"
        export TARGET="iphone:clang:latest:14.4"
        export FINALPACKAGE=1

        make clean || true
        make FINALPACKAGE=1 THEOS=$THEOS

        echo "=== build finished ==="

        # 🔥 找 dylib（绝对路径）
        DYLIB_PATH=$(find "$(pwd)/.theos" -type f -name "*.dylib" | head -n 1)

        if [ -z "$DYLIB_PATH" ]; then
          echo "❌ dylib not found"
          find .theos || true
          exit 1
        fi

        echo "✔ DYLIB: $DYLIB_PATH"

        # 可选 deb（有就用，没有也不报错）
        DEB_PATH=$(find "$(pwd)/packages" -name "*.deb" 2>/dev/null | head -n 1 || true)

        echo "✔ DEB: $DEB_PATH"

        echo "DYLIB_PATH=$DYLIB_PATH" >> $GITHUB_ENV
        echo "DEB_PATH=$DEB_PATH" >> $GITHUB_ENV

    - name: 📦 Upload artifacts (always safe)
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          ${{ env.DYLIB_PATH }}
          ${{ env.DEB_PATH }}
        if-no-files-found: error

    - name: 🚀 Create Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.event.inputs.version == 'auto' && format('v{0}', github.run_number) || github.event.inputs.version }}
        name: IOS Il2CppDumper Build ${{ github.run_number }}
        files: |
          ${{ env.DYLIB_PATH }}
          ${{ env.DEB_PATH }}
        body: |
          ## 📦 Build Success

          - Bundle ID: com.tencent.smoba
          - Arch: arm64 / arm64e
          - Build: ${{ github.run_number }}

          ### 📌 Files
          - dylib: injection file
          - deb: (if generated)

          ### ⚠️ Notes
          If deb is empty, only dylib is used.
        draft: false
        prerelease: false
