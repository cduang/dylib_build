name: 🚀 构建并发布淘宝净化插件 (TaobaoCleanShare)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: 'auto'

permissions:
  contents: write
  packages: write

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    name: 🏗️ 构建 TaobaoCleanShare
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🛠️ 安装依赖工具 (dpkg & ldid)
      run: |
        brew install dpkg ldid
        which dpkg-deb
        which ldid

    - name: 📦 设置 Theos 编译环境
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS
        rm -rf $THEOS/sdks
        git clone https://github.com/theos/sdks.git $THEOS/sdks
        # 额外下载一些非越狱环境需要的依赖（如果编译报错才加这行）
        # curl -L https://github.com/theos/lib/raw/master/libsubstrate.a -o $THEOS/vendor/lib/libsubstrate.a
    - name: 🏭 编译项目
      run: |
        echo "开始编译 Tweak..."
        cd tb_dylib
        
        # 显式注入环境变量
        export ARCHS="arm64 arm64e"
        export TARGET="iphone:clang:latest:14.0"
        export FINALPACKAGE=1
        
        # 编译打包
        make package THEOS=$THEOS
        
        # 记录时间
        BUILD_DATE=$(date +'%Y%m%d')
        BUILD_TIME=$(date +'%H%M%S')
        
        # --- 核心提取逻辑修正 ---
        # 1. 提取 DEB 文件
        DEB_NAME=$(ls packages/*.deb | head -n 1)
        
        # 2. 提取 DYLIB 文件
        # Theos 会在 .theos/obj/ 目录下生成最终合并后的 dylib
        # 我们排除掉子目录里的单架构文件，只取根部的
        DYLIB_RAW=$(ls .theos/obj/TaobaoCleanShare.dylib 2>/dev/null || find .theos/obj -name "TaobaoCleanShare.dylib" | head -n 1)

        if [ -z "$DYLIB_RAW" ]; then
          echo "❌ 错误: 未能生成 dylib 文件！"
          exit 1
        fi

        # 验证文件类型（仅查看日志）
        file "$DYLIB_RAW"
        
        # 导出路径给后续步骤 (必须带上目录前缀 tb_dylib/)
        echo "DEB_PATH=tb_dylib/$DEB_NAME" >> $GITHUB_ENV
        echo "DYLIB_PATH=tb_dylib/$DYLIB_RAW" >> $GITHUB_ENV
        echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
        echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
        
        echo "✅ 产物就绪: $DYLIB_RAW"

    - name: ⬆️ 上传构建产物 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: TaobaoCleanShare-builds
        path: |
          ${{ env.DEB_PATH }}
          ${{ env.DYLIB_PATH }}
        retention-days: 5

    - name: 🚀 创建 GitHub Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.event.inputs.version == 'auto' && format('v{0}', env.BUILD_DATE) || format('v{0}', github.event.inputs.version) }}
        name: 淘宝链接净化插件 ${{ env.BUILD_DATE }}
        files: |
          ${{ env.DEB_PATH }}
          ${{ env.DYLIB_PATH }}
        body: |
          ## 📦 构建成功
          - **版本**: `${{ github.event.inputs.version == 'auto' && env.BUILD_DATE || github.event.inputs.version }}`
          - **架构**: `arm64`, `arm64e` (Universal)
          
          ### 📱 安装提示
          - **DEB**: 越狱设备直接安装。
          - **DYLIB**: 巨魔用户推荐使用 **TrollFools** 注入。
        draft: false
        prerelease: false
