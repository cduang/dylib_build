name: 🚀 构建并发布淘宝净化插件 (TaobaoCleanShare)

# 定义工作流触发条件
on:
  # 仅允许在 GitHub Actions 页面手动触发工作流
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: 'auto'

# 设置工作流权限
permissions:
  contents: write  # 允许写入内容（创建 release）
  packages: write  # 允许上传文件

# 定义全局环境变量
env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    name: 🏗️ 构建 TaobaoCleanShare
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: 🛠️ 安装依赖工具 (dpkg & ldid)
      run: |
        # 安装打包需要的 dpkg 和签名需要的 ldid
        brew install dpkg ldid
        # 确认工具已安装
        which dpkg-deb
        which ldid

    - name: 📦 设置 Theos 编译环境
      run: |
        echo "正在克隆 Theos 核心..."
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        echo "正在克隆 iOS SDKs..."
        # 获取修补过的 iOS SDK，这是 Theos 编译所必须的
        git clone https://github.com/theos/sdks.git $THEOS/sdks
        
        # 验证 Theos 是否就绪
        ls -la $THEOS/bin/nic.pl

    - name: 🏭 编译项目
      run: |
        echo "开始编译 Tweak..."
        
        # 【修改点】进入包含 Makefile 的子目录
        cd tb_dylib
        
        # 使用 Theos 的 make 指令进行打包 (FINALPACKAGE=1 开启 Release 优化，移除 Debug 符号)
        make package FINALPACKAGE=1 THEOS=$THEOS
        
        # 获取编译时间用于版本号和 Release 名称
        BUILD_DATE=$(date +'%Y%m%d')
        BUILD_TIME=$(date +'%H%M%S')
        
        # 寻找生成的 deb 文件和 dylib 文件并赋值给环境变量
        DEB_FILE=$(ls packages/*.deb | head -n 1)
        DYLIB_FILE=$(ls .theos/obj/*/TaobaoCleanShare.dylib .theos/obj/TaobaoCleanShare.dylib 2>/dev/null | head -n 1)
        
        # 【修改点】因为我们 cd 进去了，给环境变量赋值时需要拼上前缀路径 tb_dylib/，以便后续步骤在根目录下能找到文件
        echo "DEB_PATH=tb_dylib/$DEB_FILE" >> $GITHUB_ENV
        echo "DYLIB_PATH=tb_dylib/$DYLIB_FILE" >> $GITHUB_ENV
        echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
        echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV

    - name: ⬆️ 上传构建产物 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: TaobaoCleanShare-builds
        path: |
          ${{ env.DEB_PATH }}
          ${{ env.DYLIB_PATH }}
        retention-days: 3
        compression-level: 9

    - name: 🚀 创建 Release 并上传插件
      id: create_release
      timeout-minutes: 30
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        # 如果输入的版本是 auto，则使用日期作为 tag；否则使用用户输入的版本号
        tag_name: ${{ github.event.inputs.version == 'auto' && format('v{0}', env.BUILD_DATE) || format('v{0}', github.event.inputs.version) }}
        name: 淘宝链接净化插件 ${{ env.BUILD_DATE }}
        files: |
          ${{ env.DEB_PATH }}
          ${{ env.DYLIB_PATH }}
        body: |
          # 淘宝分享净化插件自动构建
          
          ### 📦 构建信息
          - **构建时间**: ${{ env.BUILD_DATE }} ${{ env.BUILD_TIME }}
          - **版本**: ${{ github.event.inputs.version == 'auto' && env.BUILD_DATE || github.event.inputs.version }}
          
          ### 📱 使用说明
          提供两种格式供不同场景使用：
          1. **`.deb` 格式**: 适用于**越狱设备**或 **Rootless/Dopamine 环境**。直接下载通过 Filza、Sileo 或 Zebra 安装即可。
          2. **`.dylib` 格式**: 适用于**未越狱设备**。可配合 Sideloadly、牛蛙助手、轻松签等工具，直接注入到砸壳后的淘宝 IPA 包中进行重签名安装。
        draft: false
        prerelease: false
        generate_release_notes: true
