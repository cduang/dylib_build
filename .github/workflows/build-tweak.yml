name: 🚀 构建并发布淘宝净化插件 (TaobaoCleanShare)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: 'auto'

permissions:
  contents: write
  packages: write

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    name: 🏗️ 构建 TaobaoCleanShare
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: 🛠️ 安装依赖工具 (dpkg & ldid)
      run: |
        brew install dpkg ldid
        which dpkg-deb
        which ldid

    - name: 📦 设置 Theos 编译环境
      run: |
        echo "正在初始化 Theos..."
        git clone --recursive https://github.com/theos/theos.git $THEOS
        rm -rf $THEOS/sdks
        echo "正在下载 iOS SDKs..."
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    - name: 🏭 编译项目
      run: |
        echo "开始编译 Tweak..."
        
        # 切换到插件所在的子目录
        cd tb_dylib
        
        # 检查 control 文件是否存在
        if [ ! -f "control" ]; then
          echo "❌ 错误: 在 tb_dylib 目录下找不到 control 文件！"
          exit 1
        fi
        
        # 使用 Theos 进行打包
        make package FINALPACKAGE=1 THEOS=$THEOS
        
        # 记录构建时间
        BUILD_DATE=$(date +'%Y%m%d')
        BUILD_TIME=$(date +'%H%M%S')
        
        # 获取生成的产物路径
        DEB_FILE=$(find packages -name "*.deb" | head -n 1)
        DYLIB_FILE=$(find .theos/obj -name "TaobaoCleanShare.dylib" | head -n 1)
        
        if [ -z "$DEB_FILE" ]; then 
          echo "❌ 错误: 未能生成 DEB 安装包！"
          exit 1
        fi
        
        # 导出路径给后续步骤使用
        echo "DEB_PATH=tb_dylib/$DEB_FILE" >> $GITHUB_ENV
        echo "DYLIB_PATH=tb_dylib/$DYLIB_FILE" >> $GITHUB_ENV
        echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
        echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV

    - name: ⬆️ 上传构建产物 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: TaobaoCleanShare-builds
        path: |
          ${{ env.DEB_PATH }}
          ${{ env.DYLIB_PATH }}
        retention-days: 5

    - name: 🚀 创建 GitHub Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.event.inputs.version == 'auto' && format('v{0}', env.BUILD_DATE) || format('v{0}', github.event.inputs.version) }}
        name: 淘宝链接净化插件 ${{ env.BUILD_DATE }}
        files: |
          ${{ env.DEB_PATH }}
          ${{ env.DYLIB_PATH }}
        body: |
          ## 📦 自动构建完成
          - **构建日期**: `${{ env.BUILD_DATE }}`
          - **构建时间**: `${{ env.BUILD_TIME }}`
          
          ### 📱 文件说明
          1. **.deb**: 适用于越狱设备（Dopamine/Palera1n 等）。
          2. **.dylib**: 适用于非越狱设备注入（通过轻松签/Sideloadly 注入 IPA）。
        draft: false
        prerelease: false
